<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SISTEMA CENTRAL</title>

<style>
body{
background: radial-gradient(circle, #050505, #000000);
color:white;
font-family:Arial;
text-align:center;
}

/* TÍTULO */
h1{
margin-top:40px;
font-size:30px;
letter-spacing:3px;
color:#00ffff;
text-shadow:0 0 15px #00ffff;
}

/* CONTAINER */
.container{
display:flex;
justify-content:center;
gap:30px;
margin-top:60px;
flex-wrap:wrap;
}

/* CARDS */
.card{
width:200px;
height:280px;
border-radius:12px;
position:relative;
cursor:pointer;
transition:0.3s;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
box-shadow:0 0 20px #000;
}

/* TEXTO BASE */
.texto{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
font-weight:bold;
font-size:14px;
text-shadow:0 0 10px black;
}

/* BOTÃO 1 (AZUL) */
.card1{
background: linear-gradient(145deg, #001f2f, #000);
border:2px solid #00bfff;
}
.card1:hover{
transform:scale(1.08);
box-shadow:0 0 25px #00bfff;
}

/* BOTÃO 2 (ROXO) */
.card2{
background: linear-gradient(145deg, #1a0033, #000);
border:2px solid #a020f0;
}
.card2:hover{
transform:scale(1.08);
box-shadow:0 0 25px #a020f0;
}

/* BOTÃO 3 (VERMELHO BLOQUEADO) */
.card3{
background: linear-gradient(145deg, #330000, #000);
border:2px solid #ff0000;
filter:grayscale(60%);
opacity:0.7;
}
.card3:hover{
transform:scale(1.05);
box-shadow:0 0 20px #ff0000;
}

/* EXPERIMENTOS (BOTÃO 1) */
.experimentos{
font-size:26px;
font-weight:bold;
letter-spacing:3px;
color:#66ccff;
text-shadow:0 0 10px #00bfff, 0 0 20px #00bfff;
}

/* PROJETO COLORIDO (BOTÃO 2) */
.projeto{
font-size:28px;
font-weight:bold;
letter-spacing:4px;
text-shadow:0 0 10px #000;
}

.r{ color:#ff3333; text-shadow:0 0 8px #ff0000; }
.b{ color:#3399ff; text-shadow:0 0 8px #0066ff; }
.y{ color:#ffff33; text-shadow:0 0 8px #ffcc00; }

</style>
</head>

<body>

<h1>[ SISTEMA CENTRAL ]</h1>

<div class="container">

<!-- BOTÃO 1 -->
<a href="https://mf8052012-coder.github.io/mf08052012-coder.github.io/" target="_blank">
<div class="card card1">
<div class="experimentos">EXPERIMENTOS</div>
<div class="texto">ARQUIVOS EXPERIMENTAIS</div>
</div>
</a>

<!-- BOTÃO 2 -->
<div class="card card2" onclick="alert('SISTEMA PRINCIPAL JÁ ATIVO')">
<div class="projeto">
<span class="r">P</span>
<span class="b">R</span>
<span class="y">O</span>
<span class="r">J</span>
<span class="b">E</span>
<span class="y">T</span>
<span class="r">O</span>
</div>
<div class="texto">EXPANDINDO HORIZONTES</div>
</div>

<!-- BOTÃO 3 -->
<div class="card card3" onclick="alert('ACESSO BLOQUEADO')">
<div class="texto">ACESSO IRRESTRITO</div>
</div>

</div>

</body>
  </html>
