<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SISTEMA CENTRAL</title>

<style>
body{
background: radial-gradient(circle, #050505, #000000);
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:40px;
font-size:30px;
letter-spacing:3px;
color:#00ffff;
text-shadow:0 0 15px #00ffff;
}

/* CONTAINER */
.container{
display:flex;
justify-content:center;
gap:30px;
margin-top:60px;
flex-wrap:wrap;
}

/* CARDS */
.card{
width:200px;
height:280px;
border:2px solid #222;
border-radius:12px;
overflow:hidden;
position:relative;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 20px #000;
}

/* HOVER */
.card:hover{
transform:scale(1.08);
border-color:#00ffff;
box-shadow:0 0 25px #00ffff;
}

/* IMAGEM */
.card img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(35%);
}

/* ATIVO */
.card.active img{
filter:brightness(100%);
}

/* TEXTO */
.texto{
position:absolute;
bottom:15px;
width:100%;
text-align:center;
font-weight:bold;
font-size:14px;
text-shadow:0 0 10px black;
}

/* BLOQUEADO */
.blocked{
filter:grayscale(100%);
opacity:0.6;
}
</style>
</head>

<body>

<h1>[ SISTEMA CENTRAL ]</h1>

<div class="container">

<!-- BOTÃO 1 -->
<a href="https://mf8052012-coder.github.io/mf08052012-coder.github.io/" target="_blank">
<div class="card active">
<img src="https://i.imgur.com/8Km9tLL.jpg">
<div class="texto">ARQUIVOS EXPERIMENTAIS</div>
</div>
</a>

<!-- BOTÃO 2 -->
<div class="card active" onclick="alert('SISTEMA PRINCIPAL JÁ ATIVO')">
<img src="https://i.imgur.com/6X4Q7bT.jpg">
<div class="texto">EXPANDINDO HORIZONTES</div>
</div>

<!-- BOTÃO 3 -->
<div class="card blocked" onclick="alert('ACESSO BLOQUEADO')">
<img src="https://i.imgur.com/3ZQ3ZQp.jpg">
<div class="texto">ACESSO IRRESTRITO</div>
</div>

</div>

</body>
  </html>
